basePath: /api/v1/auth
definitions:
  handlers.AdminAddUserInput:
    properties:
      email:
        type: string
      full_name:
        type: string
      password:
        minLength: 6
        type: string
      role:
        enum:
        - student
        - psychologist
        - admin
        type: string
    required:
    - email
    - full_name
    - password
    - role
    type: object
  handlers.BlockUserInput:
    properties:
      blocked:
        type: boolean
    type: object
  models.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  models.LoginInput:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  models.MessageResponse:
    properties:
      message:
        type: string
    type: object
  models.RefreshInput:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  models.RegisterInput:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      role:
        description: '"student", "psychologist"'
        type: string
    required:
    - email
    - password
    - role
    type: object
  models.TokenResponse:
    properties:
      refresh_token:
        type: string
      token:
        type: string
    type: object
  models.VerifyInput:
    properties:
      code:
        type: string
      email:
        type: string
    required:
    - code
    - email
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is the authentication service for the Psychologist Backend.
  title: Auth Service API
  version: "1.0"
paths:
  /admin/users:
    post:
      consumes:
      - application/json
      description: Admin directly creates a verified user (skips email verification).
      parameters:
      - description: User Info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.AdminAddUserInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: Add a new user'
      tags:
      - admin
  /admin/users/{id}/block:
    patch:
      consumes:
      - application/json
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Block Status
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.BlockUserInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: 'Admin: Block or Unblock a user'
      tags:
      - admin
  /login:
    post:
      consumes:
      - application/json
      description: Authenticates user and returns JWT
      parameters:
      - description: Login Credentials
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.LoginInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Login User
      tags:
      - auth
  /logout:
    post:
      description: Revokes the refresh token, forcing the user to log in again once
        their access token expires.
      responses: {}
      security:
      - BearerAuth: []
      summary: Logout user
      tags:
      - auth
  /refresh:
    post:
      consumes:
      - application/json
      description: Uses a valid refresh token to generate a new 15-minute access token.
        Implements Refresh Token Rotation (returns a new refresh token too).
      parameters:
      - description: Refresh Token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RefreshInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.TokenResponse'
        "401":
          description: Invalid or expired refresh token
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Get a new access token
      tags:
      - auth
  /register:
    post:
      consumes:
      - application/json
      description: Creates a user in Auth DB, sends verification email, and creates
        profile in User Service
      parameters:
      - description: User Registration Info
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.RegisterInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: User already exists
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Register a new user
      tags:
      - auth
  /verify:
    post:
      consumes:
      - application/json
      description: Verifies the 6-digit code sent to email
      parameters:
      - description: Verification Code
        in: body
        name: input
        required: true
        schema:
          $ref: '#/definitions/models.VerifyInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.TokenResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Invalid Code
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Verify Email
      tags:
      - auth
swagger: "2.0"
