basePath: /api/v1
definitions:
  models.AddNoteInput:
    properties:
      notes:
        type: string
    required:
    - notes
    type: object
  models.BookSlotInput:
    properties:
      answers:
        type: string
      booking_type:
        enum:
        - online
        - offline
        type: string
    required:
    - booking_type
    type: object
  models.CalendarAvailabilityResponse:
    properties:
      available_dates:
        example:
        - "2026-02-10"
        - "2026-02-14"
        items:
          type: string
        type: array
    type: object
  models.CreateScheduleInput:
    properties:
      duration:
        description: 50 (default)
        type: integer
      end_date:
        description: '"2026-03-20"'
        type: string
      schedule:
        description: The template
        items:
          $ref: '#/definitions/models.DaySchedule'
        type: array
      start_date:
        description: '"2026-02-20"'
        type: string
    required:
    - end_date
    - schedule
    - start_date
    type: object
  models.DaySchedule:
    properties:
      day_of_week:
        description: 1=Mon, 2=Tue...
        type: integer
      start_times:
        description: '["09:00", "10:00", "14:00"]'
        items:
          type: string
        type: array
    required:
    - day_of_week
    - start_times
    type: object
  models.ErrorResponse:
    properties:
      error:
        example: Invalid start_date
        type: string
    type: object
  models.JoinWaitlistInput:
    properties:
      date:
        type: string
      psychologist_id:
        type: string
    required:
    - date
    - psychologist_id
    type: object
  models.MessageResponse:
    properties:
      message:
        example: Booking successful
        type: string
    type: object
  models.PsychologistScheduleResponse:
    properties:
      booking_type:
        type: string
      duration:
        type: integer
      id:
        type: string
      is_booked:
        type: boolean
      psychologist_id:
        type: string
      psychologist_name:
        type: string
      questionnaire_answers:
        type: string
      start_time:
        type: string
      student_id:
        type: string
      student_name:
        type: string
    type: object
  models.RescheduleInput:
    properties:
      new_slot_id:
        type: string
    required:
    - new_slot_id
    type: object
  models.ScheduleCreatedResponse:
    properties:
      count:
        example: 24
        type: integer
      message:
        example: Schedule created successfully
        type: string
    type: object
  models.SlotResponse:
    properties:
      booking_type:
        type: string
      duration:
        type: integer
      id:
        type: string
      is_booked:
        type: boolean
      psychologist_id:
        type: string
      psychologist_name:
        type: string
      start_time:
        type: string
    type: object
  models.StudentAppointmentResponse:
    properties:
      booking_type:
        type: string
      duration:
        type: integer
      id:
        type: string
      psychologist_id:
        type: string
      psychologist_name:
        type: string
      questionnaire_answers:
        type: string
      start_time:
        type: string
    type: object
  models.StudentHistoryResponse:
    properties:
      booking_type:
        type: string
      psychologist_notes:
        type: string
      questionnaire_answers:
        type: string
      slot_id:
        type: string
      start_time:
        type: string
    type: object
  models.WaitlistResponse:
    properties:
      created_at:
        type: string
      date:
        type: string
      id:
        type: string
      psychologist_id:
        type: string
      psychologist_name:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Slot scheduling and booking system for KBTU counseling platform.
  title: KBTU Psychologist Booking Service API
  version: "1.0"
paths:
  /psychologist/slots:
    get:
      description: Returns all slots for the logged-in psychologist, including student
        details for booked slots.
      parameters:
      - description: Filter by date (YYYY-MM-DD)
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.PsychologistScheduleResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Get psychologist's own schedule
      tags:
      - psychologist-slots
    post:
      consumes:
      - application/json
      description: Psychologist generates multiple slots based on a weekly schedule
        pattern between start_date and end_date.
      parameters:
      - description: Schedule configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateScheduleInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.ScheduleCreatedResponse'
        "400":
          description: validation error or no slots created
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: only psychologists can create slots
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: database error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create schedule slots for a psychologist
      tags:
      - psychologist-slots
  /psychologist/slots/{id}:
    delete:
      description: Allows a psychologist to remove an available slot from their schedule.
        Fails if the slot is already booked.
      parameters:
      - description: Slot ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Not authorized or not the owner
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Slot not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Cannot delete a booked slot
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an unbooked slot
      tags:
      - psychologist-slots
  /psychologist/slots/{id}/notes:
    put:
      consumes:
      - application/json
      description: Psychologist writes private notes after a session. Hidden from
        the student.
      parameters:
      - description: Slot ID
        in: path
        name: id
        required: true
        type: string
      - description: The private notes
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AddNoteInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
      security:
      - BearerAuth: []
      summary: Add private notes to a session
      tags:
      - psychologist-slots
  /psychologist/students/{student_id}/history:
    get:
      description: Psychologist views all past sessions and private notes for a specific
        student.
      parameters:
      - description: Student ID
        in: path
        name: student_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.StudentHistoryResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Get a student's session history
      tags:
      - psychologist-slots
  /slots:
    get:
      description: Returns free slots for a given psychologist and date, enriched
        with psychologist name via gRPC.
      parameters:
      - description: Psychologist ID
        in: query
        name: psychologist_id
        required: true
        type: string
      - description: Date in format YYYY-MM-DD
        in: query
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.SlotResponse'
            type: array
        "400":
          description: missing params
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: database or gRPC error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get available slots for a specific date
      tags:
      - slots
  /slots/calendar:
    get:
      description: Returns dates within the specified month where the psychologist
        has at least one free slot.
      parameters:
      - description: Psychologist ID
        in: query
        name: psychologist_id
        required: true
        type: string
      - description: Year (e.g. 2026)
        in: query
        name: year
        required: true
        type: string
      - description: Month (1-12 or 01-12)
        in: query
        name: month
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.CalendarAvailabilityResponse'
        "400":
          description: missing params
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get calendar days with available slots
      tags:
      - slots
  /student/appointments:
    get:
      description: Returns a list of all upcoming and past appointments booked by
        the logged-in student.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.StudentAppointmentResponse'
            type: array
        "403":
          description: Not authorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get student's booked appointments
      tags:
      - student-booking
  /student/slots/{id}/book:
    post:
      consumes:
      - application/json
      description: Student books a specific slot. Uses optimistic locking on the version
        field to avoid double-booking.
      parameters:
      - description: Slot ID
        in: path
        name: id
        required: true
        type: string
      - description: 'Booking details: type and answers'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.BookSlotInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: slot not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: slot already booked or just booked
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: database error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Book a slot as a student
      tags:
      - student-booking
  /student/slots/{id}/cancel:
    post:
      description: Student cancels their own booking. This frees up the slot for other
        students to book.
      parameters:
      - description: Slot ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Not authorized or not the owner
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Slot not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Slot is not booked
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Cancel a booked appointment
      tags:
      - student-booking
  /student/slots/{id}/reschedule:
    post:
      consumes:
      - application/json
      description: Student moves their booking from one slot to another available
        slot. This is done atomically so they don't lose their original slot if the
        new one is taken.
      parameters:
      - description: Old Slot ID (The one currently booked)
        in: path
        name: id
        required: true
        type: string
      - description: The new Slot ID to move to
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RescheduleInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Not authorized or not the owner
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Slot not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: New slot already booked or race condition
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Reschedule an appointment
      tags:
      - student-booking
  /student/waitlist:
    get:
      description: Student sees all the dates and psychologists they are waiting for.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.WaitlistResponse'
            type: array
      security:
      - BearerAuth: []
      summary: View my waitlists
      tags:
      - student-waitlist
    post:
      consumes:
      - application/json
      description: Student joins a waitlist for a specific psychologist on a specific
        date.
      parameters:
      - description: Waitlist details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.JoinWaitlistInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Already on waitlist
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Join a waitlist
      tags:
      - student-waitlist
  /student/waitlist/{id}:
    delete:
      description: Student removes themselves from a specific waitlist entry.
      parameters:
      - description: Waitlist Entry ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
      security:
      - BearerAuth: []
      summary: Leave a waitlist
      tags:
      - student-waitlist
schemes:
- http
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
