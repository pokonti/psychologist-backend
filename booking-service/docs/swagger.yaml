basePath: /api/v1
definitions:
  handlers.AdminDashboard:
    properties:
      most_popular_psych_id:
        type: string
      most_popular_psych_name:
        type: string
      offline_ratio:
        type: number
      online_ratio:
        type: number
      total_bookings:
        type: integer
      total_waitlisted:
        type: integer
    type: object
  models.AddNoteInput:
    properties:
      notes:
        type: string
    required:
    - notes
    type: object
  models.AdminReviewResponse:
    properties:
      psychologist_id:
        type: string
      psychologist_name:
        type: string
      rating:
        type: integer
      review:
        type: string
      slot_id:
        type: string
      start_time:
        type: string
      student_id:
        type: string
      student_name:
        type: string
    type: object
  models.AdminUserSessionResponse:
    properties:
      booking_type:
        type: string
      psychologist_id:
        type: string
      psychologist_name:
        type: string
      rating:
        type: integer
      slot_id:
        type: string
      start_time:
        type: string
      status:
        type: string
      student_id:
        type: string
      student_name:
        type: string
    type: object
  models.AnonymousReviewResponse:
    properties:
      month_year:
        description: e.g., "February 2026"
        type: string
      rating:
        type: integer
      review:
        type: string
    type: object
  models.CalendarAvailabilityResponse:
    properties:
      available_dates:
        example:
        - "2026-02-10"
        - "2026-02-14"
        items:
          type: string
        type: array
    type: object
  models.CancellationInput:
    properties:
      reason_message:
        example: I have an unexpected lecture at this time.
        type: string
      reason_topic:
        example: Schedule Conflict
        type: string
    required:
    - reason_topic
    type: object
  models.ConfirmSlotInput:
    properties:
      answers:
        example: '{"reason": "Exam stress"}'
        type: string
      phone_number:
        type: string
    required:
    - phone_number
    type: object
  models.CreateScheduleInput:
    properties:
      duration:
        description: 50 (default)
        type: integer
      end_date:
        description: '"2026-03-20"'
        type: string
      schedule:
        description: The template
        items:
          $ref: '#/definitions/models.DaySchedule'
        type: array
      start_date:
        description: '"2026-02-20"'
        type: string
    required:
    - end_date
    - schedule
    - start_date
    type: object
  models.DaySchedule:
    properties:
      day_of_week:
        description: 1=Mon, 2=Tue...
        type: integer
      start_times:
        description: '["09:00", "10:00", "14:00"]'
        items:
          type: string
        type: array
    required:
    - day_of_week
    - start_times
    type: object
  models.ErrorResponse:
    properties:
      error:
        example: Invalid start_date
        type: string
    type: object
  models.JoinWaitlistInput:
    properties:
      date:
        type: string
      psychologist_id:
        type: string
    required:
    - date
    - psychologist_id
    type: object
  models.MessageResponse:
    properties:
      message:
        example: Booking successful
        type: string
    type: object
  models.PsychologistScheduleResponse:
    properties:
      booking_type:
        type: string
      duration:
        type: integer
      id:
        type: string
      meeting_link:
        type: string
      phone_number:
        type: string
      psychologist_id:
        type: string
      questionnaire_answers:
        type: string
      start_time:
        type: string
      status:
        type: string
      student_id:
        type: string
      student_name:
        type: string
    type: object
  models.PsychologistStats:
    properties:
      average_rating:
        type: number
      cancellation_rate:
        description: '% of bookings cancelled by students'
        type: number
      most_common_booking:
        description: '"online" or "offline"'
        type: string
      sessions_this_month:
        type: integer
      total_sessions:
        type: integer
      upcoming_sessions:
        type: integer
    type: object
  models.RateSessionInput:
    properties:
      rating:
        description: Must be 1-5
        maximum: 5
        minimum: 1
        type: integer
      review:
        description: Optional text review
        maxLength: 500
        type: string
    required:
    - rating
    type: object
  models.RecommendationInput:
    properties:
      recommendations:
        type: string
    required:
    - recommendations
    type: object
  models.RescheduleInput:
    properties:
      new_slot_id:
        type: string
    required:
    - new_slot_id
    type: object
  models.ReserveSlotInput:
    properties:
      booking_type:
        enum:
        - online
        - offline
        example: online
        type: string
    required:
    - booking_type
    type: object
  models.ScheduleCreatedResponse:
    properties:
      count:
        example: 24
        type: integer
      message:
        example: Schedule created successfully
        type: string
    type: object
  models.SlotResponse:
    properties:
      booking_type:
        type: string
      duration:
        type: integer
      id:
        type: string
      meeting_link:
        type: string
      psychologist_id:
        type: string
      psychologist_name:
        type: string
      start_time:
        type: string
      status:
        type: string
    type: object
  models.StudentAppointmentResponse:
    properties:
      booking_type:
        type: string
      duration:
        type: integer
      id:
        type: string
      meeting_link:
        type: string
      psychologist_id:
        type: string
      psychologist_name:
        type: string
      questionnaire_answers:
        type: string
      start_time:
        type: string
      student_recommendations:
        type: string
    type: object
  models.StudentHistoryResponse:
    properties:
      booking_type:
        type: string
      psychologist_notes:
        type: string
      questionnaire_answers:
        type: string
      slot_id:
        type: string
      start_time:
        type: string
    type: object
  models.WaitlistResponse:
    properties:
      created_at:
        type: string
      date:
        type: string
      id:
        type: string
      psychologist_id:
        type: string
      psychologist_name:
        type: string
    type: object
host: api.kbtucare.site
info:
  contact: {}
  description: Slot scheduling and booking system for KBTU counseling platform.
  title: KBTU Psychologist Booking Service API
  version: "1.0"
paths:
  /admin/bookings:
    get:
      description: Allows admin to see all booked slots across the platform.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.SlotResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: View all bookings'
      tags:
      - admin
  /admin/bookings/{id}/cancel:
    post:
      description: Allows admin to cancel any booking, even if they aren't the psychologist
        or student.
      parameters:
      - description: Slot ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: Force cancel a booking'
      tags:
      - admin
  /admin/dashboard:
    get:
      description: Returns global stats for the admin dashboard, including top psychologist.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/handlers.AdminDashboard'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: Get system statistics'
      tags:
      - admin
  /admin/reviews:
    get:
      description: Admin views unmasked ratings and reviews across the platform, including
        student and psychologist identities.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.AdminReviewResponse'
            type: array
        "403":
          description: Admin access required
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: View all reviews'
      tags:
      - admin
  /admin/users/{id}/sessions:
    get:
      description: Returns a history of all slots (available, reserved, booked) associated
        with a specific user ID.
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.AdminUserSessionResponse'
            type: array
        "403":
          description: Admin access required
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: View all sessions for a specific user'
      tags:
      - admin
  /psychologist/reviews:
    get:
      description: Psychologist views their ratings and written reviews. Student identities
        and exact dates are anonymized to protect privacy.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.AnonymousReviewResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Get anonymous reviews
      tags:
      - psychologist-slots
  /psychologist/slots:
    get:
      description: Returns all slots for the logged-in psychologist, including student
        details for booked slots.
      parameters:
      - description: 'Filter period: ''day'', ''week'', ''month'' (default: day)'
        in: query
        name: period
        type: string
      - description: 'Start date for filter (YYYY-MM-DD), default: today'
        in: query
        name: date
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.PsychologistScheduleResponse'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get psychologist's own schedule
      tags:
      - psychologist-slots
    post:
      consumes:
      - application/json
      description: Psychologist generates multiple slots based on a weekly schedule
        pattern between start_date and end_date.
      parameters:
      - description: Schedule configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CreateScheduleInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.ScheduleCreatedResponse'
        "400":
          description: validation error or no slots created
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: only psychologists can create slots
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: database error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create schedule slots for a psychologist
      tags:
      - psychologist-slots
  /psychologist/slots/{id}:
    delete:
      description: Allows a psychologist to remove an available slot from their schedule.
        Fails if the slot is already booked.
      parameters:
      - description: Slot ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Not authorized or not the owner
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Slot not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Cannot delete a booked slot
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete an unbooked slot
      tags:
      - psychologist-slots
  /psychologist/slots/{id}/cancel:
    post:
      description: Psychologist cancels a session. Frees the slot and triggers a cancellation
        email to the student.
      parameters:
      - description: Slot ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Cancellation details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CancellationInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "403":
          description: Not authorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Slot not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Slot is not booked
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Psychologist cancels a booked appointment
      tags:
      - psychologist-slots
  /psychologist/slots/{id}/notes:
    put:
      consumes:
      - application/json
      description: Psychologist writes private notes after a session. Hidden from
        the student.
      parameters:
      - description: Slot ID
        in: path
        name: id
        required: true
        type: string
      - description: The private notes
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.AddNoteInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
      security:
      - BearerAuth: []
      summary: Add private notes to a session
      tags:
      - psychologist-slots
  /psychologist/slots/{id}/recommendations:
    put:
      description: Psychologist writes post-session recommendations. This is visible
        to the student and triggers an email notification.
      parameters:
      - description: Slot ID (UUID of the completed session)
        in: path
        name: id
        required: true
        type: string
      - description: The recommendations text
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RecommendationInput'
      responses:
        "200":
          description: Recommendations successfully saved and student notified
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Not authorized or not the owner of this session
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Slot not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Database or internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Add recommendations for a student
      tags:
      - psychologist-slots
  /psychologist/statistics:
    get:
      description: 'Returns meaningful KPIs: Load, Ratings, Trends, and efficiency.'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.PsychologistStats'
      security:
      - BearerAuth: []
      summary: Get psychologist dashboard statistics
      tags:
      - psychologist-slots
  /psychologist/statistics/detailed:
    get:
      description: Calculates KPIs like cancellation rates, working hours, and student
        reach within a date range.
      parameters:
      - description: Start Date (YYYY-MM-DD)
        in: query
        name: start_date
        type: string
      - description: End Date (YYYY-MM-DD)
        in: query
        name: end_date
        type: string
      produces:
      - application/json
      responses: {}
      security:
      - BearerAuth: []
      summary: Get comprehensive analytics for psychologist
      tags:
      - psychologist-slots
  /psychologist/students/{student_id}/history:
    get:
      description: Psychologist views all past sessions and private notes for a specific
        student.
      parameters:
      - description: Student ID
        in: path
        name: student_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.StudentHistoryResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Get a student's session history
      tags:
      - psychologist-slots
  /slots:
    get:
      description: Returns free slots for a given psychologist and date, enriched
        with psychologist name via gRPC.
      parameters:
      - description: Psychologist ID
        in: query
        name: psychologist_id
        required: true
        type: string
      - description: Date in format YYYY-MM-DD
        in: query
        name: date
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.SlotResponse'
            type: array
        "400":
          description: missing params
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: database or gRPC error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get available slots for a specific date
      tags:
      - slots
  /slots/calendar:
    get:
      description: Returns dates within the specified month where the psychologist
        has at least one free slot.
      parameters:
      - description: Psychologist ID
        in: query
        name: psychologist_id
        required: true
        type: string
      - description: Year (e.g. 2026)
        in: query
        name: year
        required: true
        type: string
      - description: Month (1-12 or 01-12)
        in: query
        name: month
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.CalendarAvailabilityResponse'
        "400":
          description: missing params
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get calendar days with available slots
      tags:
      - slots
  /student/appointments:
    get:
      description: Returns a list of all upcoming and past appointments booked by
        the logged-in student.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.StudentAppointmentResponse'
            type: array
        "403":
          description: Not authorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get student's booked appointments
      tags:
      - student-booking
  /student/slots/{id}/book:
    post:
      consumes:
      - application/json
      description: Student books a specific slot. Uses optimistic locking on the version
        field to avoid double-booking.
      parameters:
      - description: Slot ID
        in: path
        name: id
        required: true
        type: string
      - description: 'Booking details: type'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ReserveSlotInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: slot not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: slot already booked or just booked
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: database error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Book a slot as a student
      tags:
      - student-booking
  /student/slots/{id}/cancel:
    post:
      description: Student cancels their own booking. This resets the slot to 'available'
        and notifies the waitlist.
      parameters:
      - description: Slot ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Cancellation details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.CancellationInput'
      produces:
      - application/json
      responses:
        "200":
          description: Appointment successfully canceled
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Not authorized or not the owner
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Slot not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Slot is not booked
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Cancel a booked appointment
      tags:
      - student-booking
  /student/slots/{id}/confirm:
    post:
      consumes:
      - application/json
      description: Finalizes the reservation by submitting the questionnaire and student's
        phone number. Requires a previous 'reserve' action.
      parameters:
      - description: Slot ID (Must be currently 'reserved')
        in: path
        name: id
        required: true
        type: string
      - description: Booking details (phone, answers)
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ConfirmSlotInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Not authorized or no active reservation
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Slot not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Reservation expired or conflict
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Database or gRPC error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Confirm a booked appointment
      tags:
      - student-booking
  /student/slots/{id}/rate:
    post:
      consumes:
      - application/json
      description: Student leaves a 1-5 star rating and an optional review for a completed
        appointment.
      parameters:
      - description: Slot ID
        in: path
        name: id
        required: true
        type: string
      - description: Rating and Review
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RateSessionInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: Invalid rating (must be 1-5) or session not finished
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Not authorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Slot not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Session already rated
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Rate a completed session
      tags:
      - student-booking
  /student/slots/{id}/reschedule:
    post:
      consumes:
      - application/json
      description: Student moves their booking from one slot to another available
        slot atomically. Alerts waitlist for the old slot.
      parameters:
      - description: Old Slot ID (The one currently booked)
        in: path
        name: id
        required: true
        type: string
      - description: The new Slot ID to move to
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.RescheduleInput'
      produces:
      - application/json
      responses:
        "200":
          description: Appointment successfully rescheduled
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: Invalid request body or same slot IDs
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: Not authorized or not the owner
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Slot not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: New slot already booked or race condition
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Database error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Reschedule an appointment
      tags:
      - student-booking
  /student/slots/{id}/reserve:
    post:
      consumes:
      - application/json
      description: Student books a specific slot. Uses optimistic locking on the version
        field to avoid double-booking.
      parameters:
      - description: Slot ID
        in: path
        name: id
        required: true
        type: string
      - description: 'Booking details: type'
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ReserveSlotInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: slot not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: slot already booked or just booked
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: database error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Book a slot as a student
      tags:
      - student-booking
  /student/waitlist:
    get:
      description: Student sees all the dates and psychologists they are waiting for.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.WaitlistResponse'
            type: array
      security:
      - BearerAuth: []
      summary: View my waitlists
      tags:
      - student-waitlist
    post:
      consumes:
      - application/json
      description: Student joins a waitlist for a specific psychologist on a specific
        date.
      parameters:
      - description: Waitlist details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.JoinWaitlistInput'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "409":
          description: Already on waitlist
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Join a waitlist
      tags:
      - student-waitlist
  /student/waitlist/{id}:
    delete:
      description: Student removes themselves from a specific waitlist entry.
      parameters:
      - description: Waitlist Entry ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
      security:
      - BearerAuth: []
      summary: Leave a waitlist
      tags:
      - student-waitlist
schemes:
- https
- http
securityDefinitions:
  BearerAuth:
    in: header
