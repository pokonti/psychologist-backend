syntax = "proto3";

package userprofile;

option go_package = "github.com/pokonti/psychologist-backend/proto/userprofile;userprofile";


service UserProfileService {
  rpc CreateUserProfile (CreateUserProfileRequest) returns (CreateUserProfileResponse);
  rpc GetUserProfileByID (GetUserProfileByIDRequest) returns (GetUserProfileByIDResponse);
  rpc GetBatchUserProfiles (GetBatchUserProfilesRequest) returns (GetBatchUserProfilesResponse);
  rpc UpdateUserPhone (UpdateUserPhoneRequest) returns (UpdateUserPhoneResponse);
  rpc UpdateUserTelegram (UpdateUserTelegramRequest) returns (UpdateUserTelegramResponse);
  rpc UpdateUserBlockStatus (UpdateUserBlockStatusRequest) returns (UpdateUserBlockStatusResponse);
}

message CreateUserProfileRequest {
  string id = 1;     
  string email = 2;
  string role = 3;
  string full_name = 4;
}

message CreateUserProfileResponse {
  string id = 1;
}

message GetUserProfileByIDRequest {
  string id = 1;
}

message GetUserProfileByIDResponse {
  string id = 1;
  string full_name = 2;
  string gender = 3;
  string role = 4;
  string specialization = 5;
  string email = 6;
  string phone = 7;
  string telegram_chat_id = 8;
}

// Request: List of UUIDs
message GetBatchUserProfilesRequest {
  repeated string ids = 1;
}

message BasicUserProfile {
  string id = 1;
  string full_name = 2;
  string email = 3;
  string telegram_chat_id = 4;
  // Add photo_url here later if you have it
}

message GetBatchUserProfilesResponse {
  repeated BasicUserProfile profiles = 1;
}

message UpdateUserPhoneRequest {
  string id = 1;
  string phone = 2;
}

message UpdateUserPhoneResponse {
  bool success = 1;
}

message UpdateUserTelegramRequest {
  string id = 1;
  string telegram_chat_id = 2;
}

message UpdateUserTelegramResponse {
  bool success = 1;
}

message UpdateUserBlockStatusRequest {
  string id = 1;
  bool is_blocked = 2;
  string reason = 3;
}

message UpdateUserBlockStatusResponse {
  bool success = 1;
}