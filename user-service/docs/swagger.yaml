basePath: /api/v1
definitions:
  models.ErrorResponse:
    properties:
      error:
        example: Invalid start_date
        type: string
    type: object
  models.LogMoodInput:
    properties:
      mood:
        enum:
        - Amazing
        - Nice
        - Not bad
        - Sad
        - Anxiously
        - Stressed
        type: string
    required:
    - mood
    type: object
  models.MoodGraphicResponse:
    properties:
      date:
        description: '"2026-02-23"'
        type: string
      day_of_week:
        description: '"Mon", "Tue"'
        type: string
      mood:
        description: '"Amazing"'
        type: string
      score:
        description: "6"
        type: integer
    type: object
  models.PublicPsychologistResponse:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      description:
        type: string
      experience:
        type: integer
      full_name:
        type: string
      gender:
        type: string
      id:
        type: string
      rating:
        type: number
      specialization:
        type: string
    type: object
  models.UpdateProfileRequest:
    properties:
      avatar_url:
        type: string
      bio:
        type: string
      full_name:
        type: string
      gender:
        type: string
      phone:
        type: string
      specialization:
        type: string
    type: object
  models.UserProfile:
    properties:
      auth_id:
        description: reference to auth-service user
        type: integer
      avatar_url:
        type: string
      bio:
        type: string
      birth_date:
        type: string
      created_at:
        type: string
      description:
        type: string
      email:
        type: string
      experience:
        type: integer
      full_name:
        type: string
      gender:
        type: string
      id:
        type: string
      password:
        type: string
      phone_number:
        type: string
      rating:
        type: number
      rating_count:
        type: integer
      role:
        description: e.g. "client", "psychologist", "admin"
        type: string
      specialization:
        description: for psychologists
        type: string
      telegram_chat_id:
        type: string
      updated_at:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: User profiles and psychologist directory for KBTU counseling system.
  title: User Service API
  version: "1.0"
paths:
  /admin/users:
    get:
      description: Returns all profiles (Students, Psychologists, Admins).
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.UserProfile'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: 'Admin: List all users'
      tags:
      - admin
  /users/me:
    get:
      description: Returns the profile of the currently authenticated user. In production,
        the gateway injects X-User-ID based on the JWT. When calling the service directly
        (e.g. via Swagger), you must provide X-User-ID manually.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.UserProfile'
        "401":
          description: missing user id
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: profile not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: internal error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get current user's profile
      tags:
      - profile
    put:
      consumes:
      - application/json
      description: Partially update the profile of the current user. In production,
        the gateway injects X-User-ID from JWT. When calling user-service directly
        (Swagger), provide X-User-ID manually.
      parameters:
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.UpdateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.UserProfile'
        "400":
          description: invalid request body
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: missing user id
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: failed to update profile
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update current user's profile
      tags:
      - profile
  /users/me/mood:
    post:
      consumes:
      - application/json
      description: Student selects how they are feeling today. Updates the existing
        entry if already logged today.
      parameters:
      - description: Mood selection
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.LogMoodInput'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Log daily mood
      tags:
      - well-being
  /users/me/mood/graphic:
    get:
      description: Returns mood scores for the graph. Filter by 'last_week' or 'last_month'.
      parameters:
      - description: 'Filter period (default: last_week)'
        enum:
        - last_week
        - last_month
        in: query
        name: filter
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.MoodGraphicResponse'
            type: array
      security:
      - BearerAuth: []
      summary: Get mood data for graphic
      tags:
      - well-being
  /users/psychologists:
    get:
      description: Returns a sanitized list of psychologists for students to browse.
        Hides sensitive data.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/models.PublicPsychologistResponse'
            type: array
        "500":
          description: database error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List psychologists for booking
      tags:
      - users
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
